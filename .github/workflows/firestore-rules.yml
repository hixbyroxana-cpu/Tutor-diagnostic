name: Firestore Rules

"on":
  pull_request:
    paths:
      - firestore.rules
      - firestore.indexes.json
      - firebase.json
      - firestore.rules.test.ts
      - firestore.rules.test.md
      - package.json
      - package-lock.json
      - .github/workflows/firestore-rules.yml
  push:
    branches:
      - main
      - codex/tutor-accounts-notifications-email
    paths:
      - firestore.rules
      - firestore.indexes.json
      - firebase.json
      - firestore.rules.test.ts
      - firestore.rules.test.md
      - package.json
      - package-lock.json
      - .github/workflows/firestore-rules.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - run: npm run test:rules
